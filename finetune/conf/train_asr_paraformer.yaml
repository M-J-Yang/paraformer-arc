# ATC Paraformer 微调配置
# 基于 Paraformer-large 预训练模型

# network architecture
model: Paraformer
model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false
    predictor_weight: 1.0
    sampling_ratio: 0.4
    use_1st_decoder_loss: true

# encoder (使用预训练模型的配置)
encoder: ConformerEncoder
encoder_conf:
    output_size: 512
    attention_heads: 8
    linear_units: 2048
    num_blocks: 12
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    input_layer: conv2d
    normalize_before: true
    pos_enc_layer_type: rel_pos
    selfattention_layer_type: rel_selfattn
    activation_type: swish
    macaron_style: true
    use_cnn_module: true
    cnn_module_kernel: 15

# decoder
decoder: ParaformerSANDecoder
decoder_conf:
    attention_heads: 8
    linear_units: 2048
    num_blocks: 6
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.0
    src_attention_dropout_rate: 0.0

# predictor
predictor: CifPredictor
predictor_conf:
    idim: 512
    threshold: 1.0
    l_order: 1
    r_order: 1
    tail_threshold: 0.45

# frontend related
frontend: WavFrontend
frontend_conf:
    fs: 16000
    window: hamming
    n_mels: 80
    frame_length: 25
    frame_shift: 10
    lfr_m: 7
    lfr_n: 6

# 数据增强
specaug: SpecAug
specaug_conf:
    apply_time_warp: true
    time_warp_window: 5
    time_warp_mode: bicubic
    apply_freq_mask: true
    freq_mask_width_range:
    - 0
    - 30
    num_freq_mask: 2
    apply_time_mask: true
    time_mask_width_range:
    - 0
    - 40
    num_time_mask: 2

# 训练配置
train_conf:
  accum_grad: 1
  grad_clip: 5.0
  max_epoch: 20
  keep_nbest_models: 3
  avg_nbest_model: 3
  log_interval: 50
  val_scheduler_criterion:
    - valid
    - loss

# 优化器
optim: adam
optim_conf:
   lr: 5e-5
   weight_decay: 0.000001

# 学习率调度
scheduler: warmuplr
scheduler_conf:
   warmup_steps: 1000

# 数据集配置
dataset: AudioDataset
dataset_conf:
    index_ds: IndexDSJsonl
    batch_sampler: EspnetStyleBatchSampler
    batch_type: example
    batch_size: 4
    max_token_length: 2048
    buffer_size: 500
    shuffle: true
    num_workers: 2

# tokenizer (使用预训练模型的 tokens)
tokenizer: CharTokenizer
tokenizer_conf:
    unk_symbol: <unk>
