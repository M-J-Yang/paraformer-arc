# ATC Paraformer 微调配置（对齐 seaco_paraformer_large 架构）
#
# 修复说明：
#   原 config 使用 ConformerEncoder (rel_selfattn)，与 seaco_paraformer 的
#   SANMEncoder (sanm) 架构不兼容，导致 encoder 权重无法从 init_param 加载，
#   训练从随机初始化 encoder 开始 → 发散。
#   本 config 对齐 seaco 的 encoder/decoder/predictor 架构，确保权重正确加载。

# ── 模型架构（对齐 seaco config.yaml）──────────────────────────────────────
# 必须用 SeacoParaformer：CifPredictorV3 在 upsample_times>0 时返回 5 个值，
# 普通 Paraformer._calc_att_loss 只解包 4 个 → ValueError。
# SeacoParaformer 重写了 _calc_att_loss，与 CifPredictorV3 匹配。
model: SeacoParaformer
model_conf:
    ctc_weight: 0.0
    lsm_weight: 0.1
    length_normalized_loss: true
    predictor_weight: 1.0
    sampling_ratio: 0.75
    inner_dim: 256                # seaco 热词编码维度
    bias_encoder_type: lstm       # 热词 bias encoder 类型
    use_decoder_embedding: true   # 共享 decoder embedding

# encoder: SANMEncoder（对应 seaco 的 encoder.encoders.0-48）
encoder: SANMEncoder
encoder_conf:
    output_size: 512
    attention_heads: 4
    linear_units: 2048
    num_blocks: 50
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.1
    input_layer: pe
    pos_enc_class: SinusoidalPositionEncoder
    normalize_before: true
    kernel_size: 11
    sanm_shfit: 0
    selfattention_layer_type: sanm

# decoder: ParaformerSANMDecoder（对应 seaco 的 decoder.decoders.0-15）
decoder: ParaformerSANMDecoder
decoder_conf:
    attention_heads: 4
    linear_units: 2048
    num_blocks: 16
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.1
    src_attention_dropout_rate: 0.1
    att_layer_num: 16
    kernel_size: 11
    sanm_shfit: 0

# predictor: CifPredictorV3（对应 seaco 的 predictor.blstm/cif_conv1d/etc.）
predictor: CifPredictorV3
predictor_conf:
    idim: 512
    threshold: 1.0
    l_order: 1
    r_order: 1
    tail_threshold: 0.45
    smooth_factor2: 0.25
    noise_threshold2: 0.01
    upsample_times: 3
    use_cif1_cnn: false
    upsample_type: cnn_blstm

# ── 前端（与 seaco 完全一致）────────────────────────────────────────────────
frontend: WavFrontend
frontend_conf:
    fs: 16000
    window: hamming
    n_mels: 80
    frame_length: 25
    frame_shift: 10
    lfr_m: 7
    lfr_n: 6
    dither: 0.0

# ── 数据增强（对齐 seaco 的 SpecAugLFR）────────────────────────────────────
specaug: SpecAugLFR
specaug_conf:
    apply_time_warp: false
    apply_freq_mask: true
    freq_mask_width_range:
    - 0
    - 30
    lfr_rate: 6
    num_freq_mask: 1
    apply_time_mask: true
    time_mask_width_range:
    - 0
    - 12
    num_time_mask: 1

# ── 训练配置（针对 ATC 小数据集调整）───────────────────────────────────────
train_conf:
    accum_grad: 1          # 32G 显存充足，无需梯度累积
    grad_clip: 5.0
    max_epoch: 30
    keep_nbest_models: 5
    avg_nbest_model: 3
    log_interval: 50
    val_scheduler_criterion:
        - valid
        - acc
    best_model_criterion:
    -   - valid
        - acc
        - max

# ── 优化器（微调用较小 lr）──────────────────────────────────────────────────
optim: adam
optim_conf:
    lr: 1.0e-4             # 比从头训练小一个数量级
    weight_decay: 1.0e-6

scheduler: warmuplr
scheduler_conf:
    warmup_steps: 500      # 数据少，warmup 步数相应减小

# ── 数据集────────────────────────────────────────────────────────────────────
# SeacoParaformer.forward() 需要 hotword_lengths，必须用 AudioDatasetHotword
dataset: AudioDatasetHotword
dataset_conf:
    seaco_id: 8377             # <soc> token ID（与 seaco 预训练 config 一致）
    index_ds: IndexDSJsonl
    batch_sampler: EspnetStyleBatchSampler
    batch_type: example
    batch_size: 16             # 32G 显存，225M 参数模型，batch_size 可开大
    max_token_length: 2048
    buffer_size: 500
    shuffle: true
    num_workers: 4

# ── tokenizer（对齐 seaco）──────────────────────────────────────────────────
tokenizer: CharTokenizer
tokenizer_conf:
    unk_symbol: <unk>
    split_with_space: false   # ATC 文本无空格，输出更紧凑
